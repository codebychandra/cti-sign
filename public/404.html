<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CTI Sign</title>
    <!--
      SPA fallback for GitHub Pages. Redirects deep links (e.g. /cti-sign/sign/abc)
      back to index.html, which restores the URL. pathSegmentsToKeep = number of
      path parts before the app root: 1 for a project page (/<repo>/), 0 for a
      custom domain served at the root.
    -->
    <script>
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
